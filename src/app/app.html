<mat-toolbar color="primary" class="navbar" *ngIf="authService.isLoggedIn()">
  
  <span class="logo-container">
    <mat-icon>cloud</mat-icon>
    <span>INAMHI</span>
  </span>

  <span class="spacer"></span>

  <button mat-button routerLink="/funcionario" routerLinkActive="active-link">
    <mat-icon>person</mat-icon> Mi Trámite
  </button>

  <button mat-button routerLink="/director" routerLinkActive="active-link">
    <mat-icon>fact_check</mat-icon> Aprobaciones
  </button>

  <button mat-button routerLink="/estaciones" routerLinkActive="active-link">
    <mat-icon>sensors</mat-icon> Estaciones
  </button>

  <button mat-button routerLink="/historial" routerLinkActive="active-link">
    <mat-icon>history</mat-icon> Historial
  </button>

  <button mat-icon-button class="logout-btn" (click)="cerrarSesion()" title="Cerrar Sesión">
    <mat-icon>exit_to_app</mat-icon>
  </button>

</mat-toolbar>

<div class="main-content">
  <router-outlet></router-outlet>
</div>
