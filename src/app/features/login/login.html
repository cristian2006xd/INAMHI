<div class="login-container" style="
    min-height: 100vh; 
    width: 100%; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    /* Fondo con imagen profesional + overlay oscuro para legibilidad */
    background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop'); 
    background-size: cover;
    background-position: center;
    font-family: 'Inter', 'Segoe UI', sans-serif;">

  <mat-card class="login-card" style="
      width: 100%; 
      max-width: 450px; 
      padding: 3rem 2.5rem; 
      background: #ffffff; /* Fondo sólido para máxima nitidez */
      border-radius: 12px; 
      border: none;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
      color: #1e293b;">
    
    <mat-card-header style="flex-direction: column; align-items: center; margin-bottom: 2.5rem; text-align: center;">
      <div style="
          width: 64px; 
          height: 64px; 
          background: #2563eb; 
          border-radius: 12px; 
          display: flex; 
          justify-content: center; 
          align-items: center; 
          margin-bottom: 1rem;">
        <mat-icon style="font-size: 32px; width: 32px; height: 32px; color: white;">account_balance</mat-icon>
      </div>
      <mat-card-title style="font-size: 1.5rem; font-weight: 800; color: #0f172a; letter-spacing: -0.025em;">
        Sistema de Paz y Salvo
      </mat-card-title>
      <mat-card-subtitle style="color: #64748b; margin-top: 0.5rem; font-size: 0.85rem; font-weight: 500;">
        INAMHI - Gestión Institucional
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" style="display: flex; flex-direction: column; gap: 1.25rem;">
        
        <div class="form-group">
          <label style="display: block; font-size: 0.875rem; font-weight: 600; color: #334155; margin-bottom: 0.5rem;">Correo Electrónico</label>
          <mat-form-field appearance="outline" style="width: 100%;" class="modern-field">
            <mat-icon matPrefix style="color: #94a3b8;">alternate_email</mat-icon>
            <input matInput formControlName="correo" placeholder="usuario@inamhi.gob.ec" type="email">
          </mat-form-field>
        </div>

        <div class="form-group">
          <label style="display: block; font-size: 0.875rem; font-weight: 600; color: #334155; margin-bottom: 0.5rem;">Contraseña</label>
          <mat-form-field appearance="outline" style="width: 100%;" class="modern-field">
            <mat-icon matPrefix style="color: #94a3b8;">lock_outline</mat-icon>
            <input matInput [type]="ocultarPassword ? 'password' : 'text'" formControlName="password">
            <button mat-icon-button matSuffix (click)="ocultarPassword = !ocultarPassword" type="button" style="color: #94a3b8;">
              <mat-icon>{{ocultarPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
          </mat-form-field>
        </div>

        <div style="display: flex; justify-content: flex-end; margin-top: -0.5rem;">
          <a href="#" style="color: #2563eb; text-decoration: none; font-size: 0.8rem; font-weight: 600;">¿Olvidó su contraseña?</a>
        </div>
      </form>
    </mat-card-content>

    <mat-card-actions style="padding: 1.5rem 0 0 0;">
      <button mat-flat-button 
        [disabled]="loginForm.invalid" 
        (click)="iniciarSesion()"
        style="
          width: 100%; 
          padding: 1.5rem; 
          border-radius: 8px; 
          background: #1e293b; 
          color: white; 
          font-weight: 700; 
          font-size: 0.95rem; 
          text-transform: uppercase;
          letter-spacing: 0.05em;
          transition: all 0.2s ease;">
        Acceder al Portal
      </button>
    </mat-card-actions>

    <footer style="margin-top: 2rem; border-top: 1px solid #f1f5f9; padding-top: 1.5rem; text-align: center;">
      <p style="color: #94a3b8; font-size: 0.75rem;">© 2026 INAMHI. Todos los derechos reservados.</p>
    </footer>
  </mat-card>

  <style>
    /* Estilos para limpiar el diseño de Angular Material */
    ::ng-deep .modern-field .mat-mdc-text-field-wrapper {
      background-color: #f8fafc !important;
    }
    ::ng-deep .modern-field .mat-mdc-form-field-focus-overlay {
      background-color: transparent !important;
    }
    .mat-mdc-raised-button:not(:disabled) {
      background-color: #1e293b !important;
    }
    .mat-mdc-raised-button:hover:not(:disabled) {
      background-color: #0f172a !important;
    }
  </style>

</div>
