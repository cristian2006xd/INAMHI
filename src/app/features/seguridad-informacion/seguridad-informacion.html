<div [formGroup]="formSeguridad" style="display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; background-color: #f4f7f6; padding: 20px;">
  
  <div class="container" style="max-width: 950px; margin: 0 auto;">
    <div class="card border-0 shadow-lg" style="border-radius: 10px; overflow: hidden;">
      
      <div class="card-header border-0 py-3" style="background: linear-gradient(90deg, #2c3e50 0%, #4ca1af 100%);">
        <h6 class="mb-0 text-uppercase fw-bold text-white text-center" style="letter-spacing: 1.5px; font-size: 0.85rem;">
          Seguridad de la Información
        </h6>
      </div>

      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-bordered mb-0 align-middle" style="border: 1px solid #dee2e6;">
            <thead class="text-center small fw-bold" style="background-color: #f8f9fa; color: #495057;">
              <tr>
                <td colspan="3" class="py-3" style="width: 35%;">Referencia: AM 166 (EGSI)</td>
                <td colspan="3" class="py-3" style="width: 35%;">DETALLE</td>
                <td style="width: 15%;">NOMBRE RESPONSABLE</td>
                <td style="width: 15%;">FIRMA</td>
              </tr>
            </thead>
            
            <tbody class="small">
              <tr>
                <td rowspan="2" class="fw-bold text-uppercase p-3 text-center bg-light" [class.table-danger]="formSeguridad.get('archivosDigitales')?.invalid && formSeguridad.get('archivosDigitales')?.touched">
                  Archivos Digitales
                </td>
                <td class="bg-light fw-bold text-center">SI</td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [checked]="formSeguridad.get('archivosDigitales')?.value === true" (change)="toggleCheck('archivosDigitales', true)">
                </td>
                <td rowspan="2" class="p-3 text-center" [class.table-danger]="formSeguridad.get('informeActividades')?.invalid && formSeguridad.get('informeActividades')?.touched">
                  Entrega copia de informe de actividades
                </td>
                <td class="bg-light fw-bold text-center">SI</td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [checked]="formSeguridad.get('informeActividades')?.value === true" (change)="toggleCheck('informeActividades', true)">
                </td>
                <td rowspan="4" class="p-0">
                  <textarea formControlName="nombreResponsable" class="form-control border-0 h-100 shadow-none p-2" style="resize: none; min-height: 120px; font-size: 0.8rem;" placeholder="Nombre..."></textarea>
                </td>
                <td rowspan="4" class="bg-white"></td>
              </tr>
              <tr>
                <td class="bg-light fw-bold text-center">NO</td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [checked]="formSeguridad.get('archivosDigitales')?.value === false" (change)="toggleCheck('archivosDigitales', false)">
                </td>
                <td class="bg-light fw-bold text-center">NO</td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [checked]="formSeguridad.get('informeActividades')?.value === false" (change)="toggleCheck('informeActividades', false)">
                </td>
              </tr>

              <tr>
                <td rowspan="2" class="fw-bold text-uppercase p-3 text-center bg-light" [class.table-danger]="formSeguridad.get('archivosFisicos')?.invalid && formSeguridad.get('archivosFisicos')?.touched">
                  Archivos Físicos
                </td>
                <td class="bg-light fw-bold text-center">SI</td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [checked]="formSeguridad.get('archivosFisicos')?.value === true" (change)="toggleCheck('archivosFisicos', true)">
                </td>
                <td rowspan="2" class="p-3 text-center" [class.table-danger]="formSeguridad.get('verificacionInfo')?.invalid && formSeguridad.get('verificacionInfo')?.touched">
                  Verificación de la información institucional
                </td>
                <td class="bg-light fw-bold text-center">SI</td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [checked]="formSeguridad.get('verificacionInfo')?.value === true" (change)="toggleCheck('verificacionInfo', true)">
                </td>
              </tr>
              <tr>
                <td class="bg-light fw-bold text-center">NO</td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [checked]="formSeguridad.get('archivosFisicos')?.value === false" (change)="toggleCheck('archivosFisicos', false)">
                </td>
                <td class="bg-light fw-bold text-center">NO</td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [checked]="formSeguridad.get('verificacionInfo')?.value === false" (change)="toggleCheck('verificacionInfo', false)">
                </td>
              </tr>

              <tr class="bg-light">
                <td colspan="4" class="p-3">
                  <label class="fw-bold text-uppercase mb-1 d-block" style="font-size: 0.65rem;">Oficial de Seguridad:</label>
                  <input type="text" formControlName="oficialSeguridad" class="form-control form-control-sm border-0 border-bottom bg-transparent rounded-0 shadow-none p-0" [class.is-invalid]="formSeguridad.get('oficialSeguridad')?.invalid && formSeguridad.get('oficialSeguridad')?.touched">
                </td>
                <td colspan="4" class="p-3 text-center">
                  <span class="fw-bold text-uppercase d-block mb-4" style="font-size: 0.65rem;">Firma Responsable</span>
                  <div style="border-top: 1px solid #adb5bd; width: 70%; margin: 10px auto 0 auto;"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <button (click)="enviarFormulario()" class="btn btn-dark mt-4 shadow-sm px-5" style="border-radius: 20px;">
    Validar y Guardar
  </button>

</div>
