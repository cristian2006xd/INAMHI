<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; width: 100%; background-color: #f4f7f6; padding: 20px;">
  
  <div class="container" style="max-width: 900px; margin: 0 auto;">
    <div class="card border-0 shadow-lg" style="border-radius: 12px; overflow: hidden;">
      
      <div class="card-header border-0 py-3" style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
        <h6 class="mb-0 text-uppercase fw-bold text-white text-center" style="letter-spacing: 1.5px; font-size: 0.85rem;">
          <i class="fas fa-file-import me-2"></i>Dirección de Administración de Recursos Humanos - Recepción de Documentos
        </h6>
      </div>

      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-bordered mb-0 align-middle" style="border-collapse: collapse;">
            <tbody>
              <tr>
                <td class="bg-light small fw-bold text-uppercase p-3" style="width: 25%; color: #475569; font-size: 0.7rem;">
                  Fecha de entrega del Paz y Salvo
                </td>
                <td style="width: 35%;" class="p-0 bg-white">
                  <input type="date" class="form-control form-control-sm border-0 shadow-none px-3 py-2 fw-bold" style="color: #1e293b;">
                </td>
                <td class="bg-light small fw-bold text-uppercase p-3" style="width: 20%; color: #475569; font-size: 0.7rem;">
                  No. Hojas Recibidas
                </td>
                <td class="p-0 bg-white">
                  <input type="number" class="form-control form-control-sm border-0 shadow-none text-center fw-bold py-2" placeholder="0" style="color: #1e293b; background-color: #f8fafc;">
                </td>
              </tr>

              <tr>
                <td class="bg-light small fw-bold text-uppercase p-3" style="color: #475569; font-size: 0.7rem;">
                  Nombre Servidor/a quien recibe
                </td>
                <td class="p-0 bg-white">
                  <input type="text" class="form-control form-control-sm border-0 shadow-none px-3 py-3" placeholder="Nombre completo">
                </td>
                <td rowspan="2" class="bg-light small fw-bold text-uppercase p-3 text-center align-middle" style="color: #475569; font-size: 0.7rem; border-left: 1px solid #e2e8f0;">
                  Firma de Recepción
                </td>
                <td rowspan="2" class="bg-white" style="height: 100px; vertical-align: bottom; position: relative;">
                   <div style="position: absolute; bottom: 15px; left: 10%; width: 80%; border-top: 1px solid #cbd5e1;"></div>
                </td>
              </tr>

              <tr>
                <td class="bg-light small fw-bold text-uppercase p-3" style="color: #475569; font-size: 0.7rem;">
                  Cargo Servidor/a quien recibe
                </td>
                <td class="p-0 bg-white">
                  <input type="text" class="form-control form-control-sm border-0 shadow-none px-3 py-3" placeholder="Cargo institucional">
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    
    <div class="mt-3 text-end">
      <small class="text-muted text-uppercase fw-bold" style="font-size: 0.6rem; letter-spacing: 1px;">Documento de Uso Interno - RRHH</small>
    </div>
  </div>

</div>
