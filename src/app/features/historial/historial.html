<div class="container">
  <div class="header-section">
    <h1><mat-icon>history</mat-icon> Historial de Actividades</h1>
    <p>Seguimiento detallado de trámites y cambios en el sistema INAMHI</p>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef> Fecha y Hora </th>
        <td mat-cell *matCellDef="let log"> {{log.fecha}} </td>
      </ng-container>

      <ng-container matColumnDef="accion">
        <th mat-header-cell *matHeaderCellDef> Acción Realizada </th>
        <td mat-cell *matCellDef="let log" class="font-bold"> {{log.accion}} </td>
      </ng-container>

      <ng-container matColumnDef="usuario">
        <th mat-header-cell *matHeaderCellDef> Responsable </th>
        <td mat-cell *matCellDef="let log"> {{log.usuario}} </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef> Estado </th>
        <td mat-cell *matCellDef="let log">
          <span class="badge" [ngClass]="{
            'bg-success': log.estado === 'Completado',
            'bg-warning': log.estado === 'Pendiente',
            'bg-danger': log.estado === 'Rechazado'
          }">
            {{log.estado}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="ver">
        <th mat-header-cell *matHeaderCellDef> </th>
        <td mat-cell *matCellDef="let log">
          <button mat-icon-button (click)="verDetalle(log.id)" title="Ver Detalles">
            <mat-icon color="primary">visibility</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnasMostradas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnasMostradas;"></tr>
    </table>
  </mat-card>
</div>
